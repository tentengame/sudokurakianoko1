<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="数独">
  <title>数独</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #fafaf8; font-family: 'Georgia', 'Times New Roman', serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script>
  const { useState, useCallback, useEffect } = React;
  const e = React.createElement;

  const EMPTY = 0;

  function createEmptyGrid() {
    return Array.from({ length: 9 }, () => Array(9).fill(EMPTY));
  }
  function createEmptyNotes() {
    return Array.from({ length: 9 }, () => Array.from({ length: 9 }, () => new Set()));
  }

  function isValid(grid, row, col, num) {
    for (let c = 0; c < 9; c++) if (c !== col && grid[row][c] === num) return false;
    for (let r = 0; r < 9; r++) if (r !== row && grid[r][col] === num) return false;
    const br = Math.floor(row / 3) * 3, bc = Math.floor(col / 3) * 3;
    for (let r = br; r < br + 3; r++)
      for (let c = bc; c < bc + 3; c++)
        if ((r !== row || c !== col) && grid[r][c] === num) return false;
    return true;
  }

  function getConflicts(grid) {
    return Array.from({ length: 9 }, (_, r) =>
      Array.from({ length: 9 }, (_, c) =>
        grid[r][c] !== EMPTY && !isValid(grid, r, c, grid[r][c])
      )
    );
  }

  function isBoardComplete(grid, conflicts) {
    return grid.every((row, r) => row.every((v, c) => v !== EMPTY && !conflicts[r][c]));
  }

  function snapshot(grid, notes) {
    return {
      grid: grid.map(r => [...r]),
      notes: notes.map(r => r.map(s => new Set(s))),
    };
  }

  function SudokuApp() {
    const [grid, setGrid] = useState(createEmptyGrid);
    const [notes, setNotes] = useState(createEmptyNotes);
    const [fixed, setFixed] = useState(() => Array.from({ length: 9 }, () => Array(9).fill(false)));
    const [selected, setSelected] = useState(null);
    const [mode, setMode] = useState("edit");
    const [inputMode, setInputMode] = useState("answer");
    const [history, setHistory] = useState([]);
    const [complete, setComplete] = useState(false);
    const [cellSize, setCellSize] = useState(40);

    useEffect(() => {
      const update = () => {
        const vw = Math.min(window.innerWidth, 480);
        setCellSize(Math.max(32, Math.min(52, Math.floor((vw - 32) / 9))));
      };
      update();
      window.addEventListener("resize", update);
      return () => window.removeEventListener("resize", update);
    }, []);

    const conflicts = getConflicts(grid);

    useEffect(() => {
      if (mode === "play") setComplete(isBoardComplete(grid, conflicts));
    }, [grid, mode]);

    const pushHistory = useCallback(() => {
      setHistory(h => [...h.slice(-40), snapshot(grid, notes)]);
    }, [grid, notes]);

    const handleInput = useCallback((val) => {
      if (!selected) return;
      const [r, c] = selected;
      if (mode === "play" && fixed[r][c]) return;
      pushHistory();
      if (val === 0) {
        const ng = grid.map(row => [...row]); ng[r][c] = EMPTY;
        const nn = notes.map(row => row.map(s => new Set(s))); nn[r][c] = new Set();
        setGrid(ng); setNotes(nn); setComplete(false);
        return;
      }
      if (inputMode === "answer") {
        const ng = grid.map(row => [...row]); ng[r][c] = val;
        const nn = notes.map(row => row.map(s => new Set(s))); nn[r][c] = new Set();
        setGrid(ng); setNotes(nn); setComplete(false);
      } else {
        if (grid[r][c] !== EMPTY) return;
        const nn = notes.map(row => row.map(s => new Set(s)));
        if (nn[r][c].has(val)) nn[r][c].delete(val); else nn[r][c].add(val);
        setNotes(nn);
      }
    }, [selected, mode, fixed, grid, notes, inputMode, pushHistory]);

    useEffect(() => {
      const onKey = (ev) => {
        if (!selected) return;
        const [r, c] = selected;
        const dirs = { ArrowUp: [-1,0], ArrowDown: [1,0], ArrowLeft: [0,-1], ArrowRight: [0,1] };
        if (dirs[ev.key]) {
          ev.preventDefault();
          const [dr, dc] = dirs[ev.key];
          setSelected([Math.max(0, Math.min(8, r+dr)), Math.max(0, Math.min(8, c+dc))]);
          return;
        }
        if (ev.key >= "1" && ev.key <= "9") handleInput(parseInt(ev.key));
        if (ev.key === "Backspace" || ev.key === "Delete" || ev.key === "0") handleInput(0);
      };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, [selected, handleInput]);

    const undo = () => {
      if (!history.length) return;
      const prev = history[history.length - 1];
      setGrid(prev.grid); setNotes(prev.notes);
      setHistory(h => h.slice(0, -1)); setComplete(false);
    };

    const switchToPlay = () => {
      setFixed(grid.map(row => row.map(v => v !== EMPTY)));
      setMode("play"); setSelected(null); setComplete(false);
    };

    const switchToEdit = () => {
      setMode("edit");
      setFixed(Array.from({ length: 9 }, () => Array(9).fill(false)));
      setSelected(null); setComplete(false);
    };

    const clearAll = () => {
      pushHistory();
      setGrid(createEmptyGrid()); setNotes(createEmptyNotes());
      setFixed(Array.from({ length: 9 }, () => Array(9).fill(false)));
      setSelected(null); setComplete(false); setMode("edit");
    };

    const filledCount = grid.flat().filter(v => v !== EMPTY).length;
    const noteSize = Math.max(7, Math.floor(cellSize / 3.6));
    const answerFontSize = Math.max(14, Math.floor(cellSize * 0.52));

    // Build board cells
    const cells = [];
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const val = grid[r][c];
        const isSelected_ = selected && selected[0] === r && selected[1] === c;
        const isConflict = conflicts[r][c];
        const isFixed_ = fixed[r][c];
        const cellNotes = notes[r][c];
        const borderRight = (c === 2 || c === 5) ? "2px solid #1a1a1a" : "1px solid #ccc";
        const borderBottom = (r === 2 || r === 5) ? "2px solid #1a1a1a" : "1px solid #ccc";
        const bg = isSelected_ ? "#f0ede6" : "#fff";

        let inner = null;
        if (val !== EMPTY) {
          if (isFixed_ && mode === "play") {
            inner = e("div", {
              style: {
                width: Math.round(cellSize * 0.72), height: Math.round(cellSize * 0.72),
                borderRadius: "50%", border: `1.5px solid ${isConflict ? "#c0392b" : "#1a1a1a"}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: Math.max(12, Math.floor(cellSize * 0.42)), fontWeight: 600,
                color: isConflict ? "#c0392b" : "#1a1a1a", flexShrink: 0,
              }
            }, val);
          } else {
            inner = e("span", {
              style: { fontSize: answerFontSize, fontWeight: 400, color: isConflict ? "#c0392b" : "#1a1a1a" }
            }, val);
          }
          inner = e("div", {
            style: { position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }
          }, inner);
        } else if (cellNotes.size > 0) {
          const noteItems = [1,2,3,4,5,6,7,8,9].map(n =>
            e("div", {
              key: n,
              style: {
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: noteSize, color: cellNotes.has(n) ? "#c0392b" : "transparent", lineHeight: 1,
              }
            }, n)
          );
          inner = e("div", {
            style: {
              position: "absolute", inset: 2,
              display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gridTemplateRows: "repeat(3, 1fr)",
            }
          }, ...noteItems);
        }

        cells.push(e("div", {
          key: `${r}-${c}`,
          onClick: () => setSelected([r, c]),
          style: {
            width: cellSize, height: cellSize, position: "relative",
            cursor: "pointer", background: bg, borderRight, borderBottom,
          }
        }, inner));
      }
    }

    // Number pad buttons
    const numBtns = [1,2,3,4,5,6,7,8,9].map(n =>
      e("button", {
        key: n,
        onClick: () => handleInput(n),
        style: {
          width: Math.max(30, cellSize - 6), height: Math.max(34, cellSize - 2),
          border: "1px solid #d0d0cc", borderRadius: 4, background: "#fff",
          fontSize: inputMode === "note" ? Math.max(11, cellSize * 0.27) : Math.max(14, cellSize * 0.42),
          cursor: "pointer", color: inputMode === "note" ? "#c0392b" : "#1a1a1a",
          fontFamily: "Georgia, serif", fontWeight: inputMode === "answer" ? 700 : 400,
        }
      }, n)
    );
    numBtns.push(e("button", {
      key: "del",
      onClick: () => handleInput(0),
      style: {
        width: Math.max(30, cellSize - 6), height: Math.max(34, cellSize - 2),
        border: "1px solid #d0d0cc", borderRadius: 4, background: "#fff",
        fontSize: 13, cursor: "pointer", color: "#bbb", fontFamily: "Georgia, serif",
      }
    }, "✕"));

    const btnBase = (disabled) => ({
      padding: "7px 14px", border: "1px solid #d0d0cc", borderRadius: 4,
      background: "#fff", color: disabled ? "#ccc" : "#555", fontSize: 12,
      cursor: disabled ? "default" : "pointer", fontFamily: "Georgia, serif", letterSpacing: "0.04em",
    });
    const btnPrimary = {
      padding: "7px 14px", border: "1px solid #1a1a1a", borderRadius: 4,
      background: "#1a1a1a", color: "#fff", fontSize: 12,
      cursor: "pointer", fontFamily: "Georgia, serif", letterSpacing: "0.04em",
    };

    return e("div", {
      style: {
        minHeight: "100vh", background: "#fafaf8", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        fontFamily: "Georgia, serif", padding: "16px", overflowX: "hidden",
      }
    },
      // Header
      e("div", { style: { marginBottom: 12, textAlign: "center" } },
        e("div", { style: { fontSize: 10, letterSpacing: "0.22em", color: "#bbb", textTransform: "uppercase", marginBottom: 4 } },
          mode === "edit" ? "編集モード" : "プレイモード"
        ),
        e("h1", { style: { margin: 0, fontSize: 24, fontWeight: 400, color: "#1a1a1a", letterSpacing: "0.05em" } }, "数独")
      ),
      // Board
      e("div", {
        style: {
          display: "grid", gridTemplateColumns: `repeat(9, ${cellSize}px)`,
          border: "2px solid #1a1a1a", borderRadius: 3, overflow: "hidden",
          background: "#fff", userSelect: "none", flexShrink: 0,
        }
      }, ...cells),
      // Status
      e("div", { style: { marginTop: 10, fontSize: 11, color: "#aaa", height: 16 } },
        complete
          ? e("span", { style: { color: "#27ae60", fontWeight: 600 } }, "✓ 完成！おめでとうございます")
          : e("span", null, `${filledCount} / 81`)
      ),
      // Input mode toggle
      e("div", { style: { display: "flex", marginTop: 10, border: "1px solid #d0d0cc", borderRadius: 4, overflow: "hidden" } },
        e("button", {
          onClick: () => setInputMode("answer"),
          style: {
            padding: "6px 16px", border: "none", borderRight: "1px solid #d0d0cc",
            background: inputMode === "answer" ? "#1a1a1a" : "#fff",
            color: inputMode === "answer" ? "#fff" : "#555",
            fontSize: 12, cursor: "pointer", fontFamily: "Georgia, serif",
          }
        }, "確定（黒）"),
        e("button", {
          onClick: () => setInputMode("note"),
          style: {
            padding: "6px 16px", border: "none",
            background: inputMode === "note" ? "#1a1a1a" : "#fff",
            color: inputMode === "note" ? "#fff" : "#c0392b",
            fontSize: 12, cursor: "pointer", fontFamily: "Georgia, serif",
          }
        }, "候補（赤）")
      ),
      // Number pad
      e("div", { style: { display: "flex", gap: 5, marginTop: 10, flexWrap: "wrap", justifyContent: "center" } },
        ...numBtns
      ),
      // Controls
      e("div", { style: { display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap", justifyContent: "center" } },
        e("button", { onClick: undo, disabled: !history.length, style: btnBase(!history.length) }, "元に戻す"),
        mode === "edit"
          ? e("button", { onClick: switchToPlay, style: btnPrimary }, "プレイ開始")
          : e("button", { onClick: switchToEdit, style: btnBase(false) }, "編集に戻る"),
        e("button", { onClick: clearAll, style: btnBase(false) }, "クリア")
      )
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(e(SudokuApp, null));
  </script>

</body>
</html>
