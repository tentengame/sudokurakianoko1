<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数独</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f5f0e8;display:flex;flex-direction:column;align-items:center;padding:12px 8px 60px;min-height:100vh;}
#kp{width:100%;max-width:400px;background:#fff;border:2px solid #2c2416;border-radius:10px;padding:14px;margin-bottom:12px;}
#kp h2{font-size:.9rem;font-weight:700;margin-bottom:4px;}
#kp p{font-size:.7rem;color:#8a7d6b;margin-bottom:8px;}
#kp a{color:#1a5cb8;}
.kr{display:flex;gap:6px;margin-bottom:5px;}
#ki{flex:1;font-family:monospace;font-size:.74rem;border:1.5px solid #c8bfaf;border-radius:5px;padding:6px 8px;outline:none;}
#ks{padding:6px 14px;background:#2c2416;color:#f5f0e8;border:none;border-radius:5px;font-size:.74rem;cursor:pointer;}
#km{font-size:.68rem;min-height:14px;color:#27ae60;}
#km.er{color:#e74c3c;}
#kr{font-size:.68rem;color:#8a7d6b;background:none;border:none;text-decoration:underline;cursor:pointer;margin-bottom:8px;display:none;}
h1{font-size:1.7rem;font-weight:700;margin-bottom:1px;}
.sub{font-size:.65rem;color:#8a7d6b;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
#pa{width:100%;max-width:390px;margin-bottom:8px;display:none;}
#ptb{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
#ptb span{font-size:.68rem;color:#8a7d6b;}
#phb{padding:2px 9px;border:1.5px solid #c8bfaf;border-radius:4px;font-size:.68rem;cursor:pointer;background:#fff;color:#8a7d6b;}
#pi{width:100%;max-height:220px;object-fit:contain;border-radius:6px;border:1.5px solid #c8bfaf;display:block;}
#psb{font-size:.68rem;color:#8a7d6b;background:none;border:1.5px solid #c8bfaf;border-radius:4px;padding:2px 9px;margin-bottom:8px;cursor:pointer;display:none;}
#grid{display:grid;border:2.5px solid #2c2416;background:#fff;box-shadow:4px 4px 0 #2c2416;margin-bottom:8px;user-select:none;}
.cell{border-right:1px solid #c8bfaf;border-bottom:1px solid #c8bfaf;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;}
.cell.br{border-right:2.5px solid #2c2416;}
.cell.bb{border-bottom:2.5px solid #2c2416;}
.cell.sel{background:#d4c9a8!important;}
.cell.hi{background:#ede6d4;}
.cell.err{background:#fdecea;}
.ng{border-radius:50%;border:2px solid #2c2416;display:flex;align-items:center;justify-content:center;font-family:monospace;font-weight:700;pointer-events:none;}
.nc{font-family:monospace;font-weight:500;pointer-events:none;}
.cands{display:grid;grid-template-columns:repeat(3,1fr);pointer-events:none;}
.cands span{font-family:monospace;color:#c0392b;font-weight:600;display:flex;align-items:center;justify-content:center;}
#st{font-size:.74rem;color:#8a7d6b;margin-bottom:8px;min-height:16px;}
#st.ok{color:#27ae60;font-weight:600;}
#st.err{color:#e74c3c;font-weight:600;}
.modes{display:flex;border:2px solid #2c2416;border-radius:6px;overflow:hidden;margin-bottom:9px;}
.mb{padding:7px 13px;font-family:sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;border:none;background:#fff;color:#8a7d6b;}
.mb.on{background:#2c2416;color:#f5f0e8;}
.mb.oc{background:#c0392b;color:#fff;}
#np{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:9px;}
.nk{height:36px;border:2px solid #2c2416;border-radius:4px;background:#fff;font-family:monospace;font-size:.95rem;font-weight:500;cursor:pointer;}
.nk:active{background:#d4c9a8;}
.acts{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:6px;}
.btn{padding:7px 12px;border:2px solid #2c2416;border-radius:5px;font-family:sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;background:#fff;color:#1a1208;}
.btn:active{background:#d4c9a8;}
.btn.pri{background:#2c2416;color:#f5f0e8;border-color:#2c2416;}
.btn.red{border-color:#e74c3c;color:#e74c3c;}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#2c2416;color:#f5f0e8;padding:9px 18px;border-radius:20px;font-size:.75rem;opacity:0;transition:opacity .25s;pointer-events:none;white-space:pre-wrap;text-align:center;z-index:99;max-width:88vw;line-height:1.5;}
#toast.on{opacity:1;}#toast.bad{background:#e74c3c;}
#loader{display:none;position:fixed;inset:0;background:rgba(245,240,232,.85);flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:12px;}
#loader.on{display:flex;}
.spin{width:34px;height:34px;border:3px solid #c8bfaf;border-top-color:#2c2416;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
input[type=file]{display:none;}
</style>
</head>
<body>
<div id="kp">
  <h2>🔑 APIキー設定</h2>
  <p>初回のみ。<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得。</p>
  <div class="kr"><input id="ki" type="password" placeholder="sk-ant-..."><button id="ks">保存</button></div>
  <div id="km"></div>
</div>
<button id="kr">🔑 APIキー再設定</button>
<h1>数独</h1><p class="sub">Sudoku Editor</p>
<div id="pa"><div id="ptb"><span>📷 参照写真</span><button id="phb">非表示</button></div><img id="pi" src="" alt=""></div>
<button id="psb">📷 参照写真を再表示</button>
<div id="grid"></div>
<div id="st">0 / 81</div>
<div class="modes">
  <button class="mb on" data-m="given">初期値（○）</button>
  <button class="mb" data-m="confirmed">確定（黒）</button>
  <button class="mb" data-m="candidate">候補（赤）</button>
</div>
<div id="np"></div>
<div class="acts">
  <button class="btn" id="pb">📷 写真を読み込む</button>
  <button class="btn" id="ub">↩ 戻す</button>
</div>
<div class="acts">
  <button class="btn" id="cb">✓ 重複チェック ON</button>
  <button class="btn pri" id="sb">▶ プレイ開始</button>
  <button class="btn red" id="xb">クリア</button>
</div>
<input type="file" id="fi" accept="image/*">
<div id="loader"><div class="spin"></div><p style="font-size:.8rem;color:#8a7d6b">解析中...</p></div>
<div id="toast"></div><script>
var K='',cells=[],sel=null,mode='given',hist=[],play=false,chk=true,pshow=false;
function mc(){return{g:null,c:null,cands:[]};}
function mca(){cells=[];for(var i=0;i<81;i++)cells.push(mc());}
function cs(){return pshow?33:42;}
function rg(){
  var g=document.getElementById('grid'),s=cs();
  g.style.gridTemplateColumns='repeat(9,'+s+'px)';
  g.innerHTML='';
  for(var i=0;i<81;i++){
    var d=document.createElement('div'),r=Math.floor(i/9),c=i%9;
    d.className='cell'+(c==2||c==5?' br':'')+(r==2||r==5?' bb':'');
    d.style.width=s+'px';d.style.height=s+'px';
    (function(x){d.onclick=function(){sel=x;pa();};})(i);
    g.appendChild(d);
  }
  pa();
}
function pa(){for(var i=0;i<81;i++)pc(i);us();}
function pc(i){
  var el=document.getElementById('grid').children[i];
  if(!el)return;
  var ce=cells[i],s=cs(),r=Math.floor(i/9),c=i%9;
  var sr=sel!=null?Math.floor(sel/9):-1,sc=sel!=null?sel%9:-1;
  var isSel=(i==sel),isHi=!isSel&&sel!=null&&(r==sr||c==sc||(Math.floor(r/3)==Math.floor(sr/3)&&Math.floor(c/3)==Math.floor(sc/3)));
  var isErr=chk&&he(i);
  el.className='cell'+(c==2||c==5?' br':'')+(r==2||r==5?' bb':'')+(isSel?' sel':isErr?' err':isHi?' hi':'');
  el.innerHTML='';
  var fz=s<38?'.82rem':'1.05rem',ci=s-12;
  if(ce.g){var d=document.createElement('div');d.className='ng';d.style.width=ci+'px';d.style.height=ci+'px';d.style.fontSize=fz;d.textContent=ce.g;el.appendChild(d);}
  else if(ce.c){var d=document.createElement('div');d.className='nc';d.style.fontSize=fz;d.textContent=ce.c;el.appendChild(d);}
  else if(ce.cands.length>0){
    var w=document.createElement('div');w.className='cands';w.style.width=(s-3)+'px';w.style.height=(s-3)+'px';
    for(var n=1;n<=9;n++){var sp=document.createElement('span');sp.style.fontSize=s<38?'.35rem':'.46rem';sp.textContent=ce.cands.indexOf(n)>=0?n:'';w.appendChild(sp);}
    el.appendChild(w);
  }
}
function he(i){
  var v=cells[i].g||cells[i].c;if(!v)return false;
  var r=Math.floor(i/9),c=i%9;
  for(var j=0;j<81;j++){
    if(j==i)continue;
    var jv=cells[j].g||cells[j].c;if(!jv||jv!=v)continue;
    var jr=Math.floor(j/9),jc=j%9;
    if(jr==r||jc==c||(Math.floor(jr/3)==Math.floor(r/3)&&Math.floor(jc/3)==Math.floor(c/3)))return true;
  }
  return false;
}
function us(){
  var f=0,e=0;
  for(var i=0;i<81;i++){if(cells[i].g||cells[i].c)f++;if(chk&&he(i))e++;}
  var el=document.getElementById('st');
  if(e){el.textContent=f+'/81 ⚠ 重複'+e+'マス';el.className='err';}
  else if(f==81){el.textContent='✓ 完成！';el.className='ok';}
  else{el.textContent=f+' / 81';el.className='';}
}
function en(n){
  if(sel==null||(play&&cells[sel].g))return;
  ph();var ce=cells[sel];
  if(mode=='given'){ce.g=(ce.g==n)?null:n;ce.c=null;ce.cands=[];}
  else if(mode=='confirmed'){ce.c=(ce.c==n)?null:n;ce.g=null;ce.cands=[];}
  else{ce.g=null;ce.c=null;var idx=ce.cands.indexOf(n);if(idx>=0)ce.cands.splice(idx,1);else{ce.cands.push(n);ce.cands.sort(function(a,b){return a-b;});}}
  pc(sel);us();
}
function dl(){if(sel==null||(play&&cells[sel].g))return;ph();cells[sel]=mc();pc(sel);us();}
function ph(){hist.push(JSON.stringify(cells.map(function(x){return{g:x.g,c:x.c,ca:x.cands.slice()};})));if(hist.length>120)hist.shift();}
function undo(){if(!hist.length)return;cells=JSON.parse(hist.pop()).map(function(x){return{g:x.g,c:x.c,cands:x.ca};});pa();}
var tt;
function toast(m,b){var el=document.getElementById('toast');el.textContent=m;el.className='on'+(b?' bad':'');clearTimeout(tt);tt=setTimeout(function(){el.className='';},b?5500:3000);}
function hp(file){
  if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    var du=ev.target.result;
    document.getElementById('pi').src=du;
    document.getElementById('pa').style.display='block';
    document.getElementById('psb').style.display='none';
    pshow=true;rg();
    if(!K){toast('写真を表示しました。\n見ながら手入力してください。');return;}
    var b64=du.split(',')[1],mime=file.type||'image/jpeg';
    document.getElementById('loader').classList.add('on');
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':K,'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:600,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:'数独の9x9グリッドをJSONのみで返してください（説明不要）:\n{"grid":[[行0の9数字],...,[行8の9数字]]}\n空欄は0、数字は1〜9。'}
      ]}]})
    })
    .then(function(res){
      document.getElementById('loader').classList.remove('on');
      if(!res.ok){toast(res.status==401?'APIキーが無効です':res.status==429?'しばらく待って再試行してください':'OCRエラー('+res.status+')\n手入力してください',true);return null;}
      return res.json();
    })
    .then(function(data){
      if(!data)return;
      if(data.error){toast(data.error.message||'APIエラー',true);return;}
      var text=(data.content||[]).map(function(b){return b.text||'';}).join('').trim();
      var m=text.replace(/```\w*/g,'').match(/\{[\s\S]*?\}/);
      if(!m){toast('読み取り失敗\n手入力してください',true);return;}
      var p;try{p=JSON.parse(m[0]);}catch(e){toast('解析エラー',true);return;}
      var grid=p.grid;
      if(!Array.isArray(grid)||grid.length!=9){toast('認識失敗\n手入力してください',true);return;}
      ph();mca();sel=null;play=false;
      var cnt=0;
      for(var row=0;row<9;row++)for(var col=0;col<9;col++){var v=parseInt(grid[row][col]);if(v>=1&&v<=9){cells[row*9+col].g=v;cnt++;}}
      pa();toast('✓ '+cnt+'個配置しました\n間違いはタップして修正できます');
    })
    .catch(function(){document.getElementById('loader').classList.remove('on');toast('通信エラー\n手入力してください',true);});
  };
  r.readAsDataURL(file);
}
window.onload=function(){
  try{K=localStorage.getItem('sdku_key')||'';}catch(e){}
  if(K){document.getElementById('kp').style.display='none';document.getElementById('kr').style.display='inline';}
  mca();rg();
  var np=document.getElementById('np');
  for(var n=1;n<=9;n++){(function(num){var b=document.createElement('button');b.className='nk';b.textContent=num;b.onclick=function(){en(num);};np.appendChild(b);})(n);}
  document.getElementById('ks').onclick=function(){
    var v=document.getElementById('ki').value.trim(),msg=document.getElementById('km');
    if(v.indexOf('sk-ant-')!==0){msg.className='er';msg.textContent='sk-ant- で始まるキーを入力してください';return;}
    K=v;try{localStorage.setItem('sdku_key',v);}catch(e){}
    msg.className='';msg.textContent='✓ 保存しました';
    setTimeout(function(){document.getElementById('kp').style.display='none';document.getElementById('kr').style.display='inline';},600);
  };
  document.getElementById('kr').onclick=function(){document.getElementById('kp').style.display='block';document.getElementById('kr').style.display='none';};
  document.querySelectorAll('.mb').forEach(function(b){b.onclick=function(){mode=b.dataset.m;document.querySelectorAll('.mb').forEach(function(x){x.className='mb'+(x.dataset.m==mode?(mode=='candidate'?' oc':' on'):'');});};});
  document.getElementById('pb').onclick=function(){document.getElementById('fi').click();};
  document.getElementById('fi').onchange=function(e){var f=e.target.files[0];e.target.value='';hp(f);};
  document.getElementById('phb').onclick=function(){document.getElementById('pa').style.display='none';document.getElementById('psb').style.display='inline';pshow=false;rg();};
  document.getElementById('psb').onclick=function(){document.getElementById('pa').style.display='block';document.getElementById('psb').style.display='none';pshow=true;rg();};
  document.getElementById('ub').onclick=undo;
  document.getElementById('cb').onclick=function(){chk=!chk;this.textContent=chk?'✓ 重複チェック ON':'　重複チェック OFF';pa();};
  document.getElementById('sb').onclick=function(){play=true;toast('▶ プレイ開始。初期値（○）は変更不可です。');pa();};
  document.getElementById('xb').onclick=function(){if(!confirm('クリアしますか？'))return;ph();mca();sel=null;play=false;pa();};
  document.addEventListener('keydown',function(e){
    if(e.key>='1'&&e.key<='9'){en(parseInt(e.key));return;}
    if(e.key=='Backspace'||e.key=='Delete'){dl();return;}
    if(sel!=null){var r=Math.floor(sel/9),c=sel%9;
      if(e.key=='ArrowRight')sel=r*9+Math.min(8,c+1);
      if(e.key=='ArrowLeft')sel=r*9+Math.max(0,c-1);
      if(e.key=='ArrowDown')sel=Math.min(80,sel+9);
      if(e.key=='ArrowUp')sel=Math.max(0,sel-9);
      pa();}
  });
};
</script>
</body>
</html>
