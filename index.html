<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数独</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f5f0e8;--sf:#fff;--thin:#c8bfaf;--thk:#2c2416;--tx:#1a1208;--mu:#8a7d6b;
  --ca:#c0392b;--ebg:#fdecea;--er:#e74c3c;--bn:#2c2416;--bt:#f5f0e8;--sl:#d4c9a8;--hi:#ede6d4;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 56px;}

/* KEY */
#key-wrap{width:100%;max-width:420px;background:var(–sf);border:2px solid var(–thk);
border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:3px 3px 0 var(–thk);}
#key-wrap h2{font-size:.9rem;font-weight:700;margin-bottom:4px;}
#key-wrap p{font-size:.7rem;color:var(–mu);line-height:1.5;margin-bottom:8px;}
#key-wrap a{color:#1a5cb8;}
.krow{display:flex;gap:6px;margin-bottom:5px;}
#key-in{flex:1;font-family:‘DM Mono’,monospace;font-size:.74rem;
border:1.5px solid var(–thin);border-radius:5px;padding:6px 8px;background:#fafafa;outline:none;}
#key-in:focus{border-color:var(–thk);}
#key-save{padding:6px 13px;background:var(–bn);color:var(–bt);border:none;border-radius:5px;
font-size:.74rem;font-family:‘Noto Sans JP’,sans-serif;cursor:pointer;white-space:nowrap;}
#key-msg{font-size:.68rem;min-height:13px;}
#key-msg.ok{color:#27ae60;} #key-msg.er{color:var(–er);}
#key-toggle{font-size:.68rem;color:var(–mu);background:none;border:none;
text-decoration:underline;cursor:pointer;margin-bottom:10px;}

h1{font-size:1.7rem;font-weight:700;letter-spacing:.08em;margin-bottom:1px;}
.sub{font-size:.65rem;color:var(–mu);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}

/* PHOTO */
#photo-section{width:100%;max-width:390px;margin-bottom:8px;}
#photo-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
#photo-bar span{font-size:.68rem;color:var(–mu);}
#photo-hide{padding:2px 9px;border:1.5px solid var(–thin);border-radius:4px;
font-size:.68rem;cursor:pointer;background:var(–sf);color:var(–mu);font-family:inherit;}
#photo-img{width:100%;max-height:220px;object-fit:contain;border-radius:6px;
border:1.5px solid var(–thin);display:block;background:var(–bg);}
#photo-show{font-size:.68rem;color:var(–mu);background:none;
border:1.5px solid var(–thin);border-radius:4px;padding:2px 9px;
margin-bottom:8px;cursor:pointer;font-family:inherit;}

/* GRID */
#grid-wrap{margin-bottom:7px;}
#grid{display:grid;grid-template-columns:repeat(9,var(–cs,42px));
border:2.5px solid var(–thk);background:var(–sf);
box-shadow:4px 4px 0 var(–thk);user-select:none;}
.cell{width:var(–cs,42px);height:var(–cs,42px);
border-right:1px solid var(–thin);border-bottom:1px solid var(–thin);
display:flex;align-items:center;justify-content:center;cursor:pointer;
transition:background .07s;background:var(–sf);}
.cell.b-right{border-right:2.5px solid var(–thk);}
.cell.b-bottom{border-bottom:2.5px solid var(–thk);}
.cell.sel{background:var(–sl)!important;}
.cell.hi{background:var(–hi);}
.cell.err{background:var(–ebg);}
.ng{border-radius:50%;border:2px solid var(–thk);
display:flex;align-items:center;justify-content:center;
font-family:‘DM Mono’,monospace;font-weight:700;pointer-events:none;}
.nc{font-family:‘DM Mono’,monospace;font-weight:500;pointer-events:none;}
.cands{display:grid;grid-template-columns:repeat(3,1fr);pointer-events:none;}
.cands span{font-family:‘DM Mono’,monospace;color:var(–ca);font-weight:600;
display:flex;align-items:center;justify-content:center;}

#status{font-size:.74rem;color:var(–mu);margin-bottom:7px;min-height:16px;}
#status.ok{color:#27ae60;font-weight:600;} #status.err{color:var(–er);font-weight:600;}

.modes{display:flex;border:2px solid var(–thk);border-radius:6px;overflow:hidden;margin-bottom:9px;}
.mdbtn{padding:7px 12px;font-family:‘Noto Sans JP’,sans-serif;font-size:.74rem;font-weight:500;
cursor:pointer;border:none;background:var(–sf);color:var(–mu);letter-spacing:.03em;}
.mdbtn.on{background:var(–bn);color:var(–bt);}
.mdbtn.on-cand{background:var(–ca);color:#fff;}

#numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:9px;}
.nk{width:35px;height:35px;border:2px solid var(–thk);border-radius:4px;background:var(–sf);
font-family:‘DM Mono’,monospace;font-size:.92rem;font-weight:500;cursor:pointer;}
.nk:active{background:var(–sl);}

.acts{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:6px;}
.btn{padding:7px 11px;border:2px solid var(–thk);border-radius:5px;
font-family:‘Noto Sans JP’,sans-serif;font-size:.74rem;font-weight:500;
cursor:pointer;background:var(–sf);color:var(–tx);letter-spacing:.03em;}
.btn:active{background:var(–sl);}
.btn.pri{background:var(–bn);color:var(–bt);border-color:var(–bn);}
.btn.red{border-color:var(–er);color:var(–er);}
.btn.red:active{background:var(–ebg);}

#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
background:var(–bn);color:var(–bt);padding:9px 18px;border-radius:20px;
font-size:.74rem;opacity:0;transition:opacity .25s;pointer-events:none;
white-space:pre-wrap;text-align:center;z-index:99;max-width:88vw;line-height:1.5;}
#toast.on{opacity:1;} #toast.bad{background:var(–er);}

#loader{display:none;position:fixed;inset:0;background:rgba(245,240,232,.85);
flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:12px;}
#loader.on{display:flex;}
.spin{width:34px;height:34px;border:3px solid var(–thin);border-top-color:var(–bn);
border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
#loader p{font-size:.8rem;color:var(–mu);}
input[type=file]{display:none;}
</style>

</head>
<body>

<div id="key-wrap">
  <h2>🔑 APIキー設定</h2>
  <p>初回のみ設定が必要です。このデバイスに保存されます。<br>
  取得: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
  <div class="krow">
    <input id="key-in" type="password" placeholder="sk-ant-...">
    <button id="key-save" onclick="saveKey()">保存</button>
  </div>
  <div id="key-msg"></div>
</div>
<button id="key-toggle" onclick="toggleKeyPanel()" style="display:none">🔑 APIキー再設定</button>

<h1>数独</h1>
<p class="sub">Sudoku Editor</p>

<div id="photo-section" style="display:none">
  <div id="photo-bar">
    <span>📷 参照写真</span>
    <button id="photo-hide" onclick="togglePhoto(false)">非表示</button>
  </div>
  <img id="photo-img" src="" alt="">
</div>
<button id="photo-show" onclick="togglePhoto(true)" style="display:none">📷 参照写真を再表示</button>

<div id="grid-wrap"><div id="grid"></div></div>
<div id="status">0 / 81</div>

<div class="modes">
  <button class="mdbtn on" data-m="given"     onclick="setMode('given')">初期値（○）</button>
  <button class="mdbtn"    data-m="confirmed" onclick="setMode('confirmed')">確定（黒）</button>
  <button class="mdbtn"    data-m="candidate" onclick="setMode('candidate')">候補（赤）</button>
</div>

<div id="numpad"></div>

<div class="acts">
  <button class="btn" onclick="photoIn.click()">📷 写真を読み込む</button>
  <button class="btn" onclick="undo()">↩ 戻す</button>
</div>
<div class="acts">
  <button class="btn" id="chk-btn" onclick="toggleCheck()">✓ 重複チェック ON</button>
  <button class="btn pri" onclick="startPlay()">▶ プレイ開始</button>
  <button class="btn red" onclick="clearAll()">クリア</button>
</div>

<input type="file" id="photoIn" accept="image/*" onchange="onPhotoAndOCR(event)">
<div id="loader"><div class="spin"></div><p>解析中...</p></div>
<div id="toast"></div>

<script>
// ── KEY ──
var apiKey = '';
try { apiKey = localStorage.getItem('sdku_key') || ''; } catch(e){}

(function init() {
  if (apiKey) {
    document.getElementById('key-wrap').style.display = 'none';
    document.getElementById('key-toggle').style.display = 'inline';
  }
  buildGrid();
  buildNumpad();
})();

function saveKey() {
  var v = document.getElementById('key-in').value.trim();
  var msg = document.getElementById('key-msg');
  if (v.indexOf('sk-ant-') !== 0) {
    msg.className = 'er'; msg.textContent = 'sk-ant- で始まるキーを入力してください'; return;
  }
  apiKey = v;
  try { localStorage.setItem('sdku_key', v); } catch(e){}
  msg.className = 'ok'; msg.textContent = '✓ 保存しました';
  setTimeout(function() {
    document.getElementById('key-wrap').style.display = 'none';
    document.getElementById('key-toggle').style.display = 'inline';
  }, 600);
}
function toggleKeyPanel() {
  document.getElementById('key-wrap').style.display = 'block';
  document.getElementById('key-toggle').style.display = 'none';
}

// ── STATE ──
var cells = [], sel = null, mode = 'given', hist = [], play = false, checkOn = true;
function mkCell() { return {g:null, c:null, cands:[]}; }
function mkCells() { cells=[]; for(var i=0;i<81;i++) cells.push(mkCell()); }
mkCells();

// ── CELL SIZE ──
var photoShowing = false;
function getCellSize() { return photoShowing ? 33 : 43; }
function applyGridSize() {
  var cs = getCellSize();
  document.getElementById('grid').style.setProperty('--cs', cs+'px');
}

// ── TOAST ──
var toastTimer;
function toast(msg, bad) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'on' + (bad ? ' bad' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.className=''; }, bad ? 5500 : 3000);
}

// ── GRID BUILD ──
function buildGrid() {
  var g = document.getElementById('grid'); g.innerHTML = '';
  applyGridSize();
  for (var i = 0; i < 81; i++) {
    var d = document.createElement('div');
    d.className = 'cell';
    d.dataset.i = i;
    var r = Math.floor(i/9), c = i%9;
    if (c===2||c===5) d.classList.add('b-right');
    if (r===2||r===5) d.classList.add('b-bottom');
    d.addEventListener('click', (function(idx){ return function(){ pick(idx); }; })(i));
    g.appendChild(d);
  }
  paintAll();
}
function buildNumpad() {
  var np = document.getElementById('numpad'); np.innerHTML = '';
  for (var n=1; n<=9; n++) {
    var b = document.createElement('button');
    b.className = 'nk'; b.textContent = n;
    b.addEventListener('click', (function(num){ return function(){ enter(num); }; })(n));
    np.appendChild(b);
  }
}

function paintAll() { for(var i=0;i<81;i++) paintCell(i); updateStatus(); }
function paintCell(i) {
  var el = document.getElementById('grid').children[i];
  var ce = cells[i];
  var cs = getCellSize();
  // classes
  var cls = 'cell';
  var r = Math.floor(i/9), c = i%9;
  if (c===2||c===5) cls += ' b-right';
  if (r===2||r===5) cls += ' b-bottom';
  if (i === sel) cls += ' sel';
  else if (sel !== null) {
    var sr=Math.floor(sel/9), sc=sel%9;
    if (r===sr||c===sc||(Math.floor(r/3)===Math.floor(sr/3)&&Math.floor(c/3)===Math.floor(sc/3))) cls += ' hi';
  }
  if (checkOn && isErr(i)) cls += ' err';
  el.className = cls;
  // content
  el.innerHTML = '';
  var fz = cs < 38 ? '.82rem' : '1.1rem';
  var circ = cs - 12;
  if (ce.g) {
    var d = document.createElement('div');
    d.className = 'ng';
    d.style.cssText = 'width:'+circ+'px;height:'+circ+'px;font-size:'+fz;
    d.textContent = ce.g; el.appendChild(d);
  } else if (ce.c) {
    var d = document.createElement('div');
    d.className = 'nc'; d.style.fontSize = fz;
    d.textContent = ce.c; el.appendChild(d);
  } else if (ce.cands.length > 0) {
    var cfz = cs < 38 ? '.35rem' : '.48rem';
    var w = document.createElement('div');
    w.className = 'cands';
    w.style.cssText = 'width:'+(cs-4)+'px;height:'+(cs-4)+'px';
    for (var n=1; n<=9; n++) {
      var s = document.createElement('span');
      s.style.fontSize = cfz;
      s.textContent = ce.cands.indexOf(n) >= 0 ? n : '';
      w.appendChild(s);
    }
    el.appendChild(w);
  }
}

function isErr(i) {
  var v = cells[i].g || cells[i].c; if (!v) return false;
  var r=Math.floor(i/9), c=i%9;
  for (var j=0; j<81; j++) {
    if (j===i) continue;
    var jv = cells[j].g || cells[j].c; if (!jv||jv!==v) continue;
    var jr=Math.floor(j/9), jc=j%9;
    if (jr===r||jc===c||(Math.floor(jr/3)===Math.floor(r/3)&&Math.floor(jc/3)===Math.floor(c/3))) return true;
  }
  return false;
}

function updateStatus() {
  var f=0, e=0;
  for (var i=0; i<81; i++) { if(cells[i].g||cells[i].c) f++; if(checkOn&&isErr(i)) e++; }
  var el = document.getElementById('status');
  if (e)      { el.textContent=f+'/81 ⚠ 重複'+e+'マス'; el.className='err'; }
  else if(f===81){ el.textContent='✓ 完成！'; el.className='ok'; }
  else        { el.textContent=f+' / 81'; el.className=''; }
}

// ── INTERACT ──
function pick(i) { sel=i; paintAll(); }

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mdbtn').forEach(function(b) {
    b.className = 'mdbtn';
    if (b.dataset.m === m) b.className += m==='candidate' ? ' on-cand' : ' on';
  });
}

function enter(n) {
  if (sel===null||(play&&cells[sel].g)) return;
  push();
  var ce = cells[sel];
  if (mode==='given')     { ce.g=ce.g===n?null:n; ce.c=null; ce.cands=[]; }
  else if(mode==='confirmed'){ ce.c=ce.c===n?null:n; ce.g=null; ce.cands=[]; }
  else {
    ce.g=null; ce.c=null;
    var idx=ce.cands.indexOf(n);
    if(idx>=0) ce.cands.splice(idx,1); else { ce.cands.push(n); ce.cands.sort(function(a,b){return a-b;}); }
  }
  paintCell(sel); updateStatus();
}

function del() {
  if(sel===null||(play&&cells[sel].g)) return;
  push(); cells[sel]=mkCell(); paintCell(sel); updateStatus();
}

function push() {
  hist.push(JSON.stringify(cells.map(function(x){return {g:x.g,c:x.c,ca:x.cands.slice()};})));
  if(hist.length>120) hist.shift();
}

function undo() {
  if(!hist.length) return;
  cells = JSON.parse(hist.pop()).map(function(x){return {g:x.g,c:x.c,cands:x.ca};});
  paintAll();
}

function toggleCheck() {
  checkOn=!checkOn;
  document.getElementById('chk-btn').textContent = checkOn ? '✓ 重複チェック ON' : '　重複チェック OFF';
  paintAll();
}

function startPlay() { play=true; toast('▶ プレイ開始。初期値（○）は変更不可です。'); paintAll(); }

function clearAll() {
  if(!confirm('クリアしますか？')) return;
  push(); mkCells(); sel=null; play=false; paintAll();
}

function loadGrid(str) {
  var s = str.replace(/[^0-9]/g,'');
  if(s.length!==81){ toast('81文字の数字列が必要です（今'+s.length+'文字）', true); return; }
  push(); mkCells(); sel=null; play=false;
  var cnt=0;
  for(var i=0;i<81;i++){ var v=parseInt(s[i]); if(v>=1&&v<=9){cells[i].g=v;cnt++;} }
  paintAll(); toast('✓ '+cnt+'個配置しました');
}

// keyboard
document.addEventListener('keydown', function(e) {
  if(e.key>='1'&&e.key<='9') { enter(parseInt(e.key)); return; }
  if(e.key==='Backspace'||e.key==='Delete') { del(); return; }
  if(sel!==null) {
    var r=Math.floor(sel/9),c=sel%9;
    if(e.key==='ArrowRight') pick(r*9+Math.min(8,c+1));
    if(e.key==='ArrowLeft')  pick(r*9+Math.max(0,c-1));
    if(e.key==='ArrowDown')  pick(Math.min(80,sel+9));
    if(e.key==='ArrowUp')    pick(Math.max(0,sel-9));
  }
});

// ── PHOTO + OCR ──
function onPhotoAndOCR(e) {
  var file = e.target.files[0]; if(!file) return; e.target.value='';
  var reader = new FileReader();
  reader.onerror = function(){ toast('画像を開けませんでした', true); };
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var b64 = dataUrl.split(',')[1];
    var mime = file.type || 'image/jpeg';

    // まず写真を表示
    document.getElementById('photo-img').src = dataUrl;
    document.getElementById('photo-section').style.display = 'block';
    document.getElementById('photo-show').style.display = 'none';
    photoShowing = true;
    applyGridSize();
    buildGrid();

    // APIキーがなければ表示だけで終了
    if(!apiKey) {
      toast('写真を表示しました。\nOCRはAPIキーを設定してください。');
      return;
    }

    // OCR実行
    document.getElementById('loader').classList.add('on');
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'x-api-key': apiKey,
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:mime, data:b64}},
          {type:'text', text:'数独の9x9グリッドをJSONのみで返してください（説明不要）:\n{"grid":[[行0の9数字],...,[行8の9数字]]}\n空欄は0、数字は1〜9。'}
        ]}]
      })
    })
    .then(function(res) {
      document.getElementById('loader').classList.remove('on');
      if(!res.ok) {
        if(res.status===401) toast('APIキーが無効です', true);
        else if(res.status===429) toast('しばらく待ってから再試行してください', true);
        else toast('OCRエラー '+res.status+'\n写真を見ながら手入力してください', true);
        return null;
      }
      return res.json();
    })
    .then(function(data) {
      if(!data) return;
      if(data.error){ toast(data.error.message||'APIエラー', true); return; }
      var text = (data.content||[]).map(function(b){return b.text||'';}).join('').trim();
      var m = text.replace(/```\w*/g,'').match(/\{[\s\S]*?\}/);
      if(!m){ toast('読み取り失敗。写真を見ながら手入力してください。', true); return; }
      var parsed;
      try { parsed=JSON.parse(m[0]); } catch(err){ toast('解析エラー。手入力してください', true); return; }
      var grid=parsed.grid;
      if(!Array.isArray(grid)||grid.length!==9){ toast('認識失敗。手入力してください', true); return; }
      push(); mkCells(); sel=null; play=false;
      var cnt=0;
      for(var r=0;r<9;r++) for(var c=0;c<9;c++){
        var v=parseInt(grid[r][c]); if(v>=1&&v<=9){cells[r*9+c].g=v;cnt++;}
      }
      paintAll();
      toast('✓ '+cnt+'個配置しました\n間違いはタップして修正できます');
    })
    .catch(function(){
      document.getElementById('loader').classList.remove('on');
      toast('通信エラー。\n写真を見ながら手入力してください', true);
    });
  };
  reader.readAsDataURL(file);
}

function togglePhoto(show) {
  document.getElementById('photo-section').style.display = show ? 'block' : 'none';
  document.getElementById('photo-show').style.display = show ? 'none' : 'inline';
  photoShowing = show;
  applyGridSize();
  buildGrid();
}

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数独</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f5f0e8;--sf:#fff;--thin:#c8bfaf;--thk:#2c2416;--tx:#1a1208;--mu:#8a7d6b;
  --ca:#c0392b;--ebg:#fdecea;--er:#e74c3c;--bn:#2c2416;--bt:#f5f0e8;--sl:#d4c9a8;--hi:#ede6d4;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 56px;}

/* KEY */
#key-wrap{width:100%;max-width:420px;background:var(--sf);border:2px solid var(--thk);
  border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:3px 3px 0 var(--thk);}
#key-wrap h2{font-size:.9rem;font-weight:700;margin-bottom:4px;}
#key-wrap p{font-size:.7rem;color:var(--mu);line-height:1.5;margin-bottom:8px;}
#key-wrap a{color:#1a5cb8;}
.krow{display:flex;gap:6px;margin-bottom:5px;}
#key-in{flex:1;font-family:'DM Mono',monospace;font-size:.74rem;
  border:1.5px solid var(--thin);border-radius:5px;padding:6px 8px;background:#fafafa;outline:none;}
#key-in:focus{border-color:var(--thk);}
#key-save{padding:6px 13px;background:var(--bn);color:var(--bt);border:none;border-radius:5px;
  font-size:.74rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;}
#key-msg{font-size:.68rem;min-height:13px;}
#key-msg.ok{color:#27ae60;} #key-msg.er{color:var(--er);}
#key-toggle{font-size:.68rem;color:var(--mu);background:none;border:none;
  text-decoration:underline;cursor:pointer;margin-bottom:10px;}

h1{font-size:1.7rem;font-weight:700;letter-spacing:.08em;margin-bottom:1px;}
.sub{font-size:.65rem;color:var(--mu);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}

/* PHOTO */
#photo-section{width:100%;max-width:390px;margin-bottom:8px;}
#photo-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
#photo-bar span{font-size:.68rem;color:var(--mu);}
#photo-hide{padding:2px 9px;border:1.5px solid var(--thin);border-radius:4px;
  font-size:.68rem;cursor:pointer;background:var(--sf);color:var(--mu);font-family:inherit;}
#photo-img{width:100%;max-height:220px;object-fit:contain;border-radius:6px;
  border:1.5px solid var(--thin);display:block;background:var(--bg);}
#photo-show{font-size:.68rem;color:var(--mu);background:none;
  border:1.5px solid var(--thin);border-radius:4px;padding:2px 9px;
  margin-bottom:8px;cursor:pointer;font-family:inherit;}

/* GRID */
#grid-wrap{margin-bottom:7px;}
#grid{display:grid;grid-template-columns:repeat(9,var(--cs,42px));
  border:2.5px solid var(--thk);background:var(--sf);
  box-shadow:4px 4px 0 var(--thk);user-select:none;}
.cell{width:var(--cs,42px);height:var(--cs,42px);
  border-right:1px solid var(--thin);border-bottom:1px solid var(--thin);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .07s;background:var(--sf);}
.cell.b-right{border-right:2.5px solid var(--thk);}
.cell.b-bottom{border-bottom:2.5px solid var(--thk);}
.cell.sel{background:var(--sl)!important;}
.cell.hi{background:var(--hi);}
.cell.err{background:var(--ebg);}
.ng{border-radius:50%;border:2px solid var(--thk);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-weight:700;pointer-events:none;}
.nc{font-family:'DM Mono',monospace;font-weight:500;pointer-events:none;}
.cands{display:grid;grid-template-columns:repeat(3,1fr);pointer-events:none;}
.cands span{font-family:'DM Mono',monospace;color:var(--ca);font-weight:600;
  display:flex;align-items:center;justify-content:center;}

#status{font-size:.74rem;color:var(--mu);margin-bottom:7px;min-height:16px;}
#status.ok{color:#27ae60;font-weight:600;} #status.err{color:var(--er);font-weight:600;}

.modes{display:flex;border:2px solid var(--thk);border-radius:6px;overflow:hidden;margin-bottom:9px;}
.mdbtn{padding:7px 12px;font-family:'Noto Sans JP',sans-serif;font-size:.74rem;font-weight:500;
  cursor:pointer;border:none;background:var(--sf);color:var(--mu);letter-spacing:.03em;}
.mdbtn.on{background:var(--bn);color:var(--bt);}
.mdbtn.on-cand{background:var(--ca);color:#fff;}

#numpad{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:9px;}
.nk{width:35px;height:35px;border:2px solid var(--thk);border-radius:4px;background:var(--sf);
  font-family:'DM Mono',monospace;font-size:.92rem;font-weight:500;cursor:pointer;}
.nk:active{background:var(--sl);}

.acts{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:6px;}
.btn{padding:7px 11px;border:2px solid var(--thk);border-radius:5px;
  font-family:'Noto Sans JP',sans-serif;font-size:.74rem;font-weight:500;
  cursor:pointer;background:var(--sf);color:var(--tx);letter-spacing:.03em;}
.btn:active{background:var(--sl);}
.btn.pri{background:var(--bn);color:var(--bt);border-color:var(--bn);}
.btn.red{border-color:var(--er);color:var(--er);}
.btn.red:active{background:var(--ebg);}

#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--bn);color:var(--bt);padding:9px 18px;border-radius:20px;
  font-size:.74rem;opacity:0;transition:opacity .25s;pointer-events:none;
  white-space:pre-wrap;text-align:center;z-index:99;max-width:88vw;line-height:1.5;}
#toast.on{opacity:1;} #toast.bad{background:var(--er);}

#loader{display:none;position:fixed;inset:0;background:rgba(245,240,232,.85);
  flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:12px;}
#loader.on{display:flex;}
.spin{width:34px;height:34px;border:3px solid var(--thin);border-top-color:var(--bn);
  border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
#loader p{font-size:.8rem;color:var(--mu);}
input[type=file]{display:none;}
</style>

</head>
<body>

<div id="key-wrap">
  <h2>🔑 APIキー設定</h2>
  <p>初回のみ設定が必要です。このデバイスに保存されます。<br>
  取得: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
  <div class="krow">
    <input id="key-in" type="password" placeholder="sk-ant-...">
    <button id="key-save" onclick="saveKey()">保存</button>
  </div>
  <div id="key-msg"></div>
</div>
<button id="key-toggle" onclick="toggleKeyPanel()" style="display:none">🔑 APIキー再設定</button>

<h1>数独</h1>
<p class="sub">Sudoku Editor</p>

<div id="photo-section" style="display:none">
  <div id="photo-bar">
    <span>📷 参照写真</span>
    <button id="photo-hide" onclick="togglePhoto(false)">非表示</button>
  </div>
  <img id="photo-img" src="" alt="">
</div>
<button id="photo-show" onclick="togglePhoto(true)" style="display:none">📷 参照写真を再表示</button>

<div id="grid-wrap"><div id="grid"></div></div>
<div id="status">0 / 81</div>

<div class="modes">
  <button class="mdbtn on" data-m="given"     onclick="setMode('given')">初期値（○）</button>
  <button class="mdbtn"    data-m="confirmed" onclick="setMode('confirmed')">確定（黒）</button>
  <button class="mdbtn"    data-m="candidate" onclick="setMode('candidate')">候補（赤）</button>
</div>

<div id="numpad"></div>

<div class="acts">
  <button class="btn" onclick="photoIn.click()">📷 写真を読み込む</button>
  <button class="btn" onclick="undo()">↩ 戻す</button>
</div>
<div class="acts">
  <button class="btn" id="chk-btn" onclick="toggleCheck()">✓ 重複チェック ON</button>
  <button class="btn pri" onclick="startPlay()">▶ プレイ開始</button>
  <button class="btn red" onclick="clearAll()">クリア</button>
</div>

<input type="file" id="photoIn" accept="image/*" onchange="onPhotoAndOCR(event)">
<div id="loader"><div class="spin"></div><p>解析中...</p></div>
<div id="toast"></div>

<script>
// ── KEY ──
var apiKey = '';
try { apiKey = localStorage.getItem('sdku_key') || ''; } catch(e){}

(function init() {
  if (apiKey) {
    document.getElementById('key-wrap').style.display = 'none';
    document.getElementById('key-toggle').style.display = 'inline';
  }
  buildGrid();
  buildNumpad();
})();

function saveKey() {
  var v = document.getElementById('key-in').value.trim();
  var msg = document.getElementById('key-msg');
  if (v.indexOf('sk-ant-') !== 0) {
    msg.className = 'er'; msg.textContent = 'sk-ant- で始まるキーを入力してください'; return;
  }
  apiKey = v;
  try { localStorage.setItem('sdku_key', v); } catch(e){}
  msg.className = 'ok'; msg.textContent = '✓ 保存しました';
  setTimeout(function() {
    document.getElementById('key-wrap').style.display = 'none';
    document.getElementById('key-toggle').style.display = 'inline';
  }, 600);
}
function toggleKeyPanel() {
  document.getElementById('key-wrap').style.display = 'block';
  document.getElementById('key-toggle').style.display = 'none';
}

// ── STATE ──
var cells = [], sel = null, mode = 'given', hist = [], play = false, checkOn = true;
function mkCell() { return {g:null, c:null, cands:[]}; }
function mkCells() { cells=[]; for(var i=0;i<81;i++) cells.push(mkCell()); }
mkCells();

// ── CELL SIZE ──
var photoShowing = false;
function getCellSize() { return photoShowing ? 33 : 43; }
function applyGridSize() {
  var cs = getCellSize();
  document.getElementById('grid').style.setProperty('--cs', cs+'px');
}

// ── TOAST ──
var toastTimer;
function toast(msg, bad) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'on' + (bad ? ' bad' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.className=''; }, bad ? 5500 : 3000);
}

// ── GRID BUILD ──
function buildGrid() {
  var g = document.getElementById('grid'); g.innerHTML = '';
  applyGridSize();
  for (var i = 0; i < 81; i++) {
    var d = document.createElement('div');
    d.className = 'cell';
    d.dataset.i = i;
    var r = Math.floor(i/9), c = i%9;
    if (c===2||c===5) d.classList.add('b-right');
    if (r===2||r===5) d.classList.add('b-bottom');
    d.addEventListener('click', (function(idx){ return function(){ pick(idx); }; })(i));
    g.appendChild(d);
  }
  paintAll();
}
function buildNumpad() {
  var np = document.getElementById('numpad'); np.innerHTML = '';
  for (var n=1; n<=9; n++) {
    var b = document.createElement('button');
    b.className = 'nk'; b.textContent = n;
    b.addEventListener('click', (function(num){ return function(){ enter(num); }; })(n));
    np.appendChild(b);
  }
}

function paintAll() { for(var i=0;i<81;i++) paintCell(i); updateStatus(); }
function paintCell(i) {
  var el = document.getElementById('grid').children[i];
  var ce = cells[i];
  var cs = getCellSize();
  // classes
  var cls = 'cell';
  var r = Math.floor(i/9), c = i%9;
  if (c===2||c===5) cls += ' b-right';
  if (r===2||r===5) cls += ' b-bottom';
  if (i === sel) cls += ' sel';
  else if (sel !== null) {
    var sr=Math.floor(sel/9), sc=sel%9;
    if (r===sr||c===sc||(Math.floor(r/3)===Math.floor(sr/3)&&Math.floor(c/3)===Math.floor(sc/3))) cls += ' hi';
  }
  if (checkOn && isErr(i)) cls += ' err';
  el.className = cls;
  // content
  el.innerHTML = '';
  var fz = cs < 38 ? '.82rem' : '1.1rem';
  var circ = cs - 12;
  if (ce.g) {
    var d = document.createElement('div');
    d.className = 'ng';
    d.style.cssText = 'width:'+circ+'px;height:'+circ+'px;font-size:'+fz;
    d.textContent = ce.g; el.appendChild(d);
  } else if (ce.c) {
    var d = document.createElement('div');
    d.className = 'nc'; d.style.fontSize = fz;
    d.textContent = ce.c; el.appendChild(d);
  } else if (ce.cands.length > 0) {
    var cfz = cs < 38 ? '.35rem' : '.48rem';
    var w = document.createElement('div');
    w.className = 'cands';
    w.style.cssText = 'width:'+(cs-4)+'px;height:'+(cs-4)+'px';
    for (var n=1; n<=9; n++) {
      var s = document.createElement('span');
      s.style.fontSize = cfz;
      s.textContent = ce.cands.indexOf(n) >= 0 ? n : '';
      w.appendChild(s);
    }
    el.appendChild(w);
  }
}

function isErr(i) {
  var v = cells[i].g || cells[i].c; if (!v) return false;
  var r=Math.floor(i/9), c=i%9;
  for (var j=0; j<81; j++) {
    if (j===i) continue;
    var jv = cells[j].g || cells[j].c; if (!jv||jv!==v) continue;
    var jr=Math.floor(j/9), jc=j%9;
    if (jr===r||jc===c||(Math.floor(jr/3)===Math.floor(r/3)&&Math.floor(jc/3)===Math.floor(c/3))) return true;
  }
  return false;
}

function updateStatus() {
  var f=0, e=0;
  for (var i=0; i<81; i++) { if(cells[i].g||cells[i].c) f++; if(checkOn&&isErr(i)) e++; }
  var el = document.getElementById('status');
  if (e)      { el.textContent=f+'/81 ⚠ 重複'+e+'マス'; el.className='err'; }
  else if(f===81){ el.textContent='✓ 完成！'; el.className='ok'; }
  else        { el.textContent=f+' / 81'; el.className=''; }
}

// ── INTERACT ──
function pick(i) { sel=i; paintAll(); }

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mdbtn').forEach(function(b) {
    b.className = 'mdbtn';
    if (b.dataset.m === m) b.className += m==='candidate' ? ' on-cand' : ' on';
  });
}

function enter(n) {
  if (sel===null||(play&&cells[sel].g)) return;
  push();
  var ce = cells[sel];
  if (mode==='given')     { ce.g=ce.g===n?null:n; ce.c=null; ce.cands=[]; }
  else if(mode==='confirmed'){ ce.c=ce.c===n?null:n; ce.g=null; ce.cands=[]; }
  else {
    ce.g=null; ce.c=null;
    var idx=ce.cands.indexOf(n);
    if(idx>=0) ce.cands.splice(idx,1); else { ce.cands.push(n); ce.cands.sort(function(a,b){return a-b;}); }
  }
  paintCell(sel); updateStatus();
}

function del() {
  if(sel===null||(play&&cells[sel].g)) return;
  push(); cells[sel]=mkCell(); paintCell(sel); updateStatus();
}

function push() {
  hist.push(JSON.stringify(cells.map(function(x){return {g:x.g,c:x.c,ca:x.cands.slice()};})));
  if(hist.length>120) hist.shift();
}

function undo() {
  if(!hist.length) return;
  cells = JSON.parse(hist.pop()).map(function(x){return {g:x.g,c:x.c,cands:x.ca};});
  paintAll();
}

function toggleCheck() {
  checkOn=!checkOn;
  document.getElementById('chk-btn').textContent = checkOn ? '✓ 重複チェック ON' : '　重複チェック OFF';
  paintAll();
}

function startPlay() { play=true; toast('▶ プレイ開始。初期値（○）は変更不可です。'); paintAll(); }

function clearAll() {
  if(!confirm('クリアしますか？')) return;
  push(); mkCells(); sel=null; play=false; paintAll();
}

function loadGrid(str) {
  var s = str.replace(/[^0-9]/g,'');
  if(s.length!==81){ toast('81文字の数字列が必要です（今'+s.length+'文字）', true); return; }
  push(); mkCells(); sel=null; play=false;
  var cnt=0;
  for(var i=0;i<81;i++){ var v=parseInt(s[i]); if(v>=1&&v<=9){cells[i].g=v;cnt++;} }
  paintAll(); toast('✓ '+cnt+'個配置しました');
}

// keyboard
document.addEventListener('keydown', function(e) {
  if(e.key>='1'&&e.key<='9') { enter(parseInt(e.key)); return; }
  if(e.key==='Backspace'||e.key==='Delete') { del(); return; }
  if(sel!==null) {
    var r=Math.floor(sel/9),c=sel%9;
    if(e.key==='ArrowRight') pick(r*9+Math.min(8,c+1));
    if(e.key==='ArrowLeft')  pick(r*9+Math.max(0,c-1));
    if(e.key==='ArrowDown')  pick(Math.min(80,sel+9));
    if(e.key==='ArrowUp')    pick(Math.max(0,sel-9));
  }
});

// ── PHOTO + OCR ──
function onPhotoAndOCR(e) {
  var file = e.target.files[0]; if(!file) return; e.target.value='';
  var reader = new FileReader();
  reader.onerror = function(){ toast('画像を開けませんでした', true); };
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var b64 = dataUrl.split(',')[1];
    var mime = file.type || 'image/jpeg';

    // まず写真を表示
    document.getElementById('photo-img').src = dataUrl;
    document.getElementById('photo-section').style.display = 'block';
    document.getElementById('photo-show').style.display = 'none';
    photoShowing = true;
    applyGridSize();
    buildGrid();

    // APIキーがなければ表示だけで終了
    if(!apiKey) {
      toast('写真を表示しました。\nOCRはAPIキーを設定してください。');
      return;
    }

    // OCR実行
    document.getElementById('loader').classList.add('on');
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'x-api-key': apiKey,
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:mime, data:b64}},
          {type:'text', text:'数独の9x9グリッドをJSONのみで返してください（説明不要）:\n{"grid":[[行0の9数字],...,[行8の9数字]]}\n空欄は0、数字は1〜9。'}
        ]}]
      })
    })
    .then(function(res) {
      document.getElementById('loader').classList.remove('on');
      if(!res.ok) {
        if(res.status===401) toast('APIキーが無効です', true);
        else if(res.status===429) toast('しばらく待ってから再試行してください', true);
        else toast('OCRエラー '+res.status+'\n写真を見ながら手入力してください', true);
        return null;
      }
      return res.json();
    })
    .then(function(data) {
      if(!data) return;
      if(data.error){ toast(data.error.message||'APIエラー', true); return; }
      var text = (data.content||[]).map(function(b){return b.text||'';}).join('').trim();
      var m = text.replace(/```\w*/g,'').match(/\{[\s\S]*?\}/);
      if(!m){ toast('読み取り失敗。写真を見ながら手入力してください。', true); return; }
      var parsed;
      try { parsed=JSON.parse(m[0]); } catch(err){ toast('解析エラー。手入力してください', true); return; }
      var grid=parsed.grid;
      if(!Array.isArray(grid)||grid.length!==9){ toast('認識失敗。手入力してください', true); return; }
      push(); mkCells(); sel=null; play=false;
      var cnt=0;
      for(var r=0;r<9;r++) for(var c=0;c<9;c++){
        var v=parseInt(grid[r][c]); if(v>=1&&v<=9){cells[r*9+c].g=v;cnt++;}
      }
      paintAll();
      toast('✓ '+cnt+'個配置しました\n間違いはタップして修正できます');
    })
    .catch(function(){
      document.getElementById('loader').classList.remove('on');
      toast('通信エラー。\n写真を見ながら手入力してください', true);
    });
  };
  reader.readAsDataURL(file);
}

function togglePhoto(show) {
  document.getElementById('photo-section').style.display = show ? 'block' : 'none';
  document.getElementById('photo-show').style.display = show ? 'none' : 'inline';
  photoShowing = show;
  applyGridSize();
  buildGrid();
}

// ── OCR ──
function onOCR(e) {
  var file = e.target.files[0]; if(!file) return; e.target.value='';
  if(!apiKey) {
    toast('APIキーを設定してください', true);
    document.getElementById('key-wrap').style.display='block';
    document.getElementById('key-toggle').style.display='none';
    return;
  }
  var reader = new FileReader();
  reader.onerror = function(){ toast('画像を開けませんでした', true); };
  reader.onload = function(ev) {
    var b64 = ev.target.result.split(',')[1];
    var mime = file.type || 'image/jpeg';
    document.getElementById('loader').classList.add('on');
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'x-api-key': apiKey,
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:mime, data:b64}},
          {type:'text', text:'数独の9x9グリッドをJSONのみで返してください（説明不要）:\n{"grid":[[行0の9数字],...,[行8の9数字]]}\n空欄は0、数字は1〜9。'}
        ]}]
      })
    })
    .then(function(res) {
      document.getElementById('loader').classList.remove('on');
      if(!res.ok) {
        if(res.status===401) toast('APIキーが無効です', true);
        else if(res.status===429) toast('しばらく待ってから再試行してください', true);
        else toast('エラー '+res.status, true);
        return null;
      }
      return res.json();
    })
    .then(function(data) {
      if(!data) return;
      if(data.error){ toast(data.error.message||'APIエラー', true); return; }
      var text = (data.content||[]).map(function(b){return b.text||'';}).join('').trim();
      var m = text.replace(/```\w*/g,'').match(/\{[\s\S]*?\}/);
      if(!m){ toast('数独を認識できませんでした\n正面から鮮明に撮り直してください', true); return; }
      var parsed;
      try { parsed=JSON.parse(m[0]); } catch(err){ toast('解析エラー。撮り直してください', true); return; }
      var grid=parsed.grid;
      if(!Array.isArray(grid)||grid.length!==9){ toast('9x9グリッドとして認識できませんでした', true); return; }
      push(); mkCells(); sel=null; play=false;
      var cnt=0;
      for(var r=0;r<9;r++) for(var c=0;c<9;c++){
        var v=parseInt(grid[r][c]); if(v>=1&&v<=9){cells[r*9+c].g=v;cnt++;}
      }
      paintAll();
      toast(cnt===0?'数字を読み取れませんでした':'✓ '+cnt+'個配置しました\n間違いはタップして修正できます', cnt===0);
    })
    .catch(function(){ document.getElementById('loader').classList.remove('on'); toast('通信エラー。Wi-Fiを確認してください', true); });
  };
  reader.readAsDataURL(file);
}
</script>
